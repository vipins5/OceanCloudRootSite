<svg width="900" height="1120" viewBox="0 0 900 1120" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="dqdesc">
  <title id="dqdesc">What happens when a DLP policy quarantines a file in SharePoint or OneDrive</title>
  <defs>
    <linearGradient id="dqbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06121f"/>
      <stop offset="100%" stop-color="#0e2236"/>
    </linearGradient>
    <marker id="dqar" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#7bc6e8"/>
    </marker>
  </defs>
  <rect width="900" height="1120" fill="url(#dqbg)" rx="20"/>
  <circle cx="820" cy="140" r="180" fill="#00b4d8" opacity="0.08"/>
  <circle cx="80" cy="1060" r="200" fill="#60a5fa" opacity="0.06"/>
  <text x="450" y="74" text-anchor="middle" fill="#e8f6ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="40" font-weight="800">DLP File Quarantine, Step by Step</text>
  <text x="450" y="108" text-anchor="middle" fill="#a8cfdf" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20">What happens after a match in SharePoint or OneDrive</text>

  <rect x="100" y="138" width="700" height="90" rx="14" fill="#0f2f48" stroke="#3a88ad" stroke-width="2"/>
  <text x="450" y="184" text-anchor="middle" fill="#d9f2ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="25" font-weight="700">File uploaded or edited in a monitored location</text>
  <text x="450" y="213" text-anchor="middle" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">DLP evaluates the content against active policy rules</text>
  <line x1="450" y1="228" x2="450" y2="268" stroke="#7bc6e8" stroke-width="3" marker-end="url(#dqar)"/>

  <rect x="80" y="270" width="740" height="86" rx="14" fill="#12344f" stroke="#4f90b8" stroke-width="2"/>
  <text x="450" y="314" text-anchor="middle" fill="#e8f6ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="700">Does the file match a sensitive info type or label condition?</text>
  <text x="450" y="343" text-anchor="middle" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Rule checks content, sensitivity labels, and any grouped conditions</text>
  <line x1="450" y1="356" x2="450" y2="396" stroke="#7bc6e8" stroke-width="3" marker-end="url(#dqar)"/>

  <rect x="40" y="398" width="820" height="148" rx="12" fill="#0f2a40" stroke="#4b91b7" stroke-width="1.5"/>
  <rect x="40" y="398" width="7" height="148" rx="4" fill="#00b4d8"/>
  <circle cx="94" cy="472" r="24" fill="rgba(0,180,216,0.18)"/>
  <text x="94" y="480" text-anchor="middle" fill="#00b4d8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">1</text>
  <text x="132" y="440" fill="#dff3ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="700">File moved to quarantine site</text>
  <text x="132" y="468" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">Removed from its original SharePoint or OneDrive location</text>
  <text x="132" y="494" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">and relocated to the admin-defined quarantine site.</text>
  <text x="132" y="526" fill="#8ce1ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">The quarantine destination must be a SharePoint site — never a OneDrive.</text>

  <rect x="40" y="562" width="820" height="148" rx="12" fill="#0f2a40" stroke="#4b91b7" stroke-width="1.5"/>
  <rect x="40" y="562" width="7" height="148" rx="4" fill="#60a5fa"/>
  <circle cx="94" cy="636" r="24" fill="rgba(96,165,250,0.18)"/>
  <text x="94" y="644" text-anchor="middle" fill="#60a5fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">2</text>
  <text x="132" y="604" fill="#dff3ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="700">Tombstone file left behind</text>
  <text x="132" y="632" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">A text file replaces the original, showing your configured</text>
  <text x="132" y="658" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">message and the relative path of the quarantined file.</text>
  <text x="132" y="690" fill="#a8c8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Set this message once in DLP Settings &gt; File quarantine.</text>

  <rect x="40" y="726" width="820" height="148" rx="12" fill="#0f2a40" stroke="#4b91b7" stroke-width="1.5"/>
  <rect x="40" y="726" width="7" height="148" rx="4" fill="#4ade80"/>
  <circle cx="94" cy="800" r="24" fill="rgba(74,222,128,0.18)"/>
  <text x="94" y="808" text-anchor="middle" fill="#4ade80" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">3</text>
  <text x="132" y="768" fill="#dff3ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="700">Compliance admin gets alerted</text>
  <text x="132" y="796" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">A DLP alert fires with file owner, original path, and</text>
  <text x="132" y="822" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">quarantine location so the incident can be triaged fast.</text>
  <text x="132" y="854" fill="#baf7d1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Activity Explorer logs the same match for later audit.</text>

  <rect x="40" y="890" width="820" height="148" rx="12" fill="#17293a" stroke="#86b1bf" stroke-width="1.5" stroke-dasharray="7,3"/>
  <rect x="40" y="890" width="7" height="148" rx="4" fill="#94a3b8"/>
  <circle cx="94" cy="964" r="24" fill="rgba(148,163,184,0.18)"/>
  <text x="94" y="972" text-anchor="middle" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">4</text>
  <text x="132" y="932" fill="#c8daea" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="700">Manual restore only — plan for it</text>
  <text x="132" y="960" fill="#8ca4b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">There is no restore button in the Purview portal. An admin</text>
  <text x="132" y="986" fill="#8ca4b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">retrieves the file from the quarantine site and re-shares it.</text>
  <text x="132" y="1018" fill="#7a94a8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Original sharing links and permissions are not retained through the cycle.</text>
</svg>
