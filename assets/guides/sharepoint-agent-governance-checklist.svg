<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">SharePoint Agent Governance Checklist</title>
  <desc id="desc">Checklist panel for agent owner, source scope, permissions, monitoring, and review cadence.</desc>
  <rect width="1200" height="700" fill="#f7fbf8"/>
  <text x="600" y="66" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" fill="#1a3e30">SharePoint Agent Governance Checklist</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#163529">
    <rect x="90" y="120" width="1020" height="510" rx="20" fill="#ffffff" stroke="#c9e4d7"/>

    <rect x="130" y="164" width="28" height="28" rx="4" fill="#1b8f5a"/>
    <path d="M137 178 L146 188 L162 170" stroke="#ffffff" stroke-width="4" fill="none"/>
    <text x="180" y="186">Assign business and technical owners</text>

    <rect x="130" y="232" width="28" height="28" rx="4" fill="#1b8f5a"/>
    <path d="M137 246 L146 256 L162 238" stroke="#ffffff" stroke-width="4" fill="none"/>
    <text x="180" y="254">Limit agent sources to curated libraries and sites</text>

    <rect x="130" y="300" width="28" height="28" rx="4" fill="#1b8f5a"/>
    <path d="M137 314 L146 324 L162 306" stroke="#ffffff" stroke-width="4" fill="none"/>
    <text x="180" y="322">Validate permissions before sharing in Teams</text>

    <rect x="130" y="368" width="28" height="28" rx="4" fill="#1b8f5a"/>
    <path d="M137 382 L146 392 L162 374" stroke="#ffffff" stroke-width="4" fill="none"/>
    <text x="180" y="390">Monitor .agent files and adoption reports monthly</text>

    <rect x="130" y="436" width="28" height="28" rx="4" fill="#1b8f5a"/>
    <path d="M137 450 L146 460 L162 442" stroke="#ffffff" stroke-width="4" fill="none"/>
    <text x="180" y="458">Use approval flow for official tenant agents</text>

    <rect x="130" y="504" width="28" height="28" rx="4" fill="#1b8f5a"/>
    <path d="M137 518 L146 528 L162 510" stroke="#ffffff" stroke-width="4" fill="none"/>
    <text x="180" y="526">Set quarterly source and access review date</text>

    <text x="130" y="590" font-size="20" fill="#3a5b4f">Tip: start narrow, prove value, then expand sources.</text>
  </g>
</svg>
