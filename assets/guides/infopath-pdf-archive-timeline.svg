<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">InfoPath XML to PDF archive timeline</title>
  <desc id="desc">Timeline showing InfoPath form libraries, XML form records, PDF rendering, and final storage in a SharePoint document library before July 14 2026.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071a2c"/>
      <stop offset="0.55" stop-color="#0b2a34"/>
      <stop offset="1" stop-color="#10221e"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="24" fill="url(#bg)"/>
  <path d="M86 374 C240 258 326 442 482 312 S740 250 879 330 S1053 323 1124 222" fill="none" stroke="rgba(255,255,255,.10)" stroke-width="2"/>
  <g transform="translate(78 76)">
    <text x="0" y="0" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="800">InfoPath retirement archive runbook</text>
    <text x="0" y="38" fill="#b8cfe0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Render every historical XML form to PDF before the service retirement window closes.</text>
  </g>
  <g transform="translate(96 178)" filter="url(#shadow)">
    <rect width="226" height="166" rx="16" fill="#0e314a" stroke="#2a607a"/>
    <rect x="26" y="30" width="62" height="76" rx="6" fill="#123e5d" stroke="#4db9e8"/>
    <path d="M76 30 v20 h18" fill="none" stroke="#4db9e8" stroke-width="4"/>
    <rect x="102" y="38" width="88" height="10" rx="5" fill="#5cc8ef"/>
    <rect x="102" y="62" width="70" height="10" rx="5" fill="#8bdcf4" opacity=".8"/>
    <rect x="102" y="86" width="96" height="10" rx="5" fill="#8bdcf4" opacity=".55"/>
    <text x="24" y="132" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800">1. Inventory</text>
    <text x="24" y="154" fill="#b8cfe0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">Form libraries and templates</text>
  </g>
  <g transform="translate(362 178)" filter="url(#shadow)">
    <rect width="226" height="166" rx="16" fill="#0f3a35" stroke="#2a7568"/>
    <rect x="32" y="32" width="74" height="88" rx="7" fill="#123f3a" stroke="#55d798"/>
    <text x="48" y="86" fill="#a7f3d0" font-family="Consolas,monospace" font-size="22" font-weight="800">XML</text>
    <path d="M126 54 h54 M126 78 h66 M126 102 h40" stroke="#a7f3d0" stroke-width="9" stroke-linecap="round"/>
    <text x="24" y="132" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800">2. Render</text>
    <text x="24" y="154" fill="#c8f6df" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">Use the live InfoPath view</text>
  </g>
  <g transform="translate(628 178)" filter="url(#shadow)">
    <rect width="226" height="166" rx="16" fill="#312b16" stroke="#7b641e"/>
    <rect x="32" y="30" width="76" height="94" rx="7" fill="#463b18" stroke="#f5b942"/>
    <text x="48" y="86" fill="#fde68a" font-family="Consolas,monospace" font-size="22" font-weight="800">PDF</text>
    <rect x="126" y="42" width="58" height="12" rx="6" fill="#fde68a"/>
    <rect x="126" y="68" width="76" height="12" rx="6" fill="#fde68a" opacity=".75"/>
    <rect x="126" y="94" width="48" height="12" rx="6" fill="#fde68a" opacity=".55"/>
    <text x="24" y="132" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800">3. Validate</text>
    <text x="24" y="154" fill="#f8e6b2" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">Counts, metadata, hash</text>
  </g>
  <g transform="translate(894 178)" filter="url(#shadow)">
    <rect width="226" height="166" rx="16" fill="#2c2037" stroke="#765091"/>
    <rect x="28" y="32" width="164" height="92" rx="10" fill="#3a2a47" stroke="#c084fc"/>
    <rect x="46" y="52" width="130" height="12" rx="6" fill="#d8b4fe"/>
    <rect x="46" y="78" width="94" height="12" rx="6" fill="#d8b4fe" opacity=".78"/>
    <rect x="46" y="104" width="112" height="12" rx="6" fill="#d8b4fe" opacity=".55"/>
    <text x="24" y="132" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800">4. Store</text>
    <text x="24" y="154" fill="#ead8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">Records document library</text>
  </g>
  <path d="M322 261 H362 M588 261 H628 M854 261 H894" stroke="url(#line)" stroke-width="8" stroke-linecap="round"/>
  <g transform="translate(78 410)">
    <rect width="1044" height="56" rx="15" fill="rgba(255,255,255,.07)" stroke="rgba(255,255,255,.12)"/>
    <text x="26" y="36" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800">Deadline:</text>
    <text x="120" y="36" fill="#fde68a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Finish historical PDF rendering before July 14, 2026.</text>
    <text x="682" y="36" fill="#b8cfe0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Keep XML, XSN, PDF, metadata, and validation evidence together.</text>
  </g>
</svg>
