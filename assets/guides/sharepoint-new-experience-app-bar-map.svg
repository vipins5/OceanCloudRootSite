<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="abdesc">
  <title id="abdesc">Map of the redesigned SharePoint app bar: Discover, Publish, and Build</title>
  <defs>
    <linearGradient id="abbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06121f"/>
      <stop offset="100%" stop-color="#0e2236"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#abbg)" rx="20"/>
  <circle cx="1100" cy="120" r="180" fill="#00b4d8" opacity="0.08"/>
  <circle cx="90" cy="820" r="200" fill="#60a5fa" opacity="0.06"/>
  <text x="600" y="72" text-anchor="middle" fill="#e8f6ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="40" font-weight="800">The Redesigned SharePoint App Bar</text>
  <text x="600" y="106" text-anchor="middle" fill="#a8cfdf" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20">Three destinations replace the classic start page navigation</text>

  <rect x="70" y="140" width="1060" height="120" rx="14" fill="#0f2f48" stroke="#3a88ad" stroke-width="2"/>
  <text x="600" y="188" text-anchor="middle" fill="#d9f2ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">Global navigation bar (logo + name)</text>
  <text x="600" y="220" text-anchor="middle" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Shown at the top when configured in your Home site — carries branding across every page</text>
  <text x="600" y="246" text-anchor="middle" fill="#7a9ab0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Neutral app theming now applies underneath: a consistent palette across SharePoint UI surfaces, including SPFx placeholders</text>

  <!-- Discover -->
  <rect x="70" y="300" width="330" height="330" rx="16" fill="#0f2a40" stroke="#00b4d8" stroke-width="2"/>
  <circle cx="140" cy="360" r="26" fill="rgba(0,180,216,0.18)"/>
  <text x="140" y="369" text-anchor="middle" fill="#00b4d8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="800">D</text>
  <text x="180" y="370" fill="#dff3ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="26" font-weight="700">Discover</text>
  <text x="100" y="418" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Replaces the classic</text>
  <text x="100" y="444" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">SharePoint start page.</text>
  <text x="100" y="484" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Surfaces relevant sites,</text>
  <text x="100" y="510" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">content, and news for</text>
  <text x="100" y="536" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">the signed-in user.</text>
  <text x="100" y="588" fill="#8ce1ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">"Followed Sites" becomes</text>
  <text x="100" y="610" fill="#8ce1ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">"Favorite Sites."</text>

  <!-- Publish -->
  <rect x="435" y="300" width="330" height="330" rx="16" fill="#0f2a40" stroke="#60a5fa" stroke-width="2"/>
  <circle cx="505" cy="360" r="26" fill="rgba(96,165,250,0.18)"/>
  <text x="505" y="369" text-anchor="middle" fill="#60a5fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="800">P</text>
  <text x="545" y="370" fill="#dff3ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="26" font-weight="700">Publish</text>
  <text x="465" y="418" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">New destination for</text>
  <text x="465" y="444" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">pages, news, and</text>
  <text x="465" y="470" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">campaign-style</text>
  <text x="465" y="496" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">communications.</text>
  <text x="465" y="548" fill="#a8c8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">"Saved for Later" becomes</text>
  <text x="465" y="570" fill="#a8c8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">"Favorites" for pages/news.</text>

  <!-- Build -->
  <rect x="800" y="300" width="330" height="330" rx="16" fill="#0f2a40" stroke="#4ade80" stroke-width="2"/>
  <circle cx="870" cy="360" r="26" fill="rgba(74,222,128,0.18)"/>
  <text x="870" y="369" text-anchor="middle" fill="#4ade80" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="800">B</text>
  <text x="910" y="370" fill="#dff3ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="26" font-weight="700">Build</text>
  <text x="830" y="418" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">One surface for makers</text>
  <text x="830" y="444" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">to create and manage</text>
  <text x="830" y="470" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">sites, lists, libraries,</text>
  <text x="830" y="496" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">and AI-powered agents.</text>
  <text x="830" y="548" fill="#baf7d1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Consolidates entry points</text>
  <text x="830" y="570" fill="#baf7d1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">that used to be scattered.</text>

  <rect x="70" y="680" width="1060" height="160" rx="14" fill="#17293a" stroke="#86b1bf" stroke-width="1.5" stroke-dasharray="7,3"/>
  <text x="600" y="726" text-anchor="middle" fill="#c8daea" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="700">Preview-only escape hatch</text>
  <text x="600" y="760" text-anchor="middle" fill="#8ca4b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">During the preview phase, individual users could toggle back to the classic app bar.</text>
  <text x="600" y="790" text-anchor="middle" fill="#8ca4b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Microsoft Learn confirms that toggle is available only during preview — once your tenant</text>
  <text x="600" y="818" text-anchor="middle" fill="#8ca4b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">reaches standard release, the new app bar is what everyone sees, permanently.</text>
</svg>
