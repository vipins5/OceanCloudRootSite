<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Guest Access Troubleshooting Flow</title>
  <desc id="desc">Decision path for troubleshooting guest access by checking site setting, tenant setting, Entra restrictions, and link type.</desc>
  <rect width="1200" height="650" fill="#fff9f7"/>
  <text x="600" y="62" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" fill="#6a2d20">Guest Access Troubleshooting Path</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#5a2419" text-anchor="middle">
    <rect x="430" y="110" width="340" height="88" rx="14" fill="#ffe9e2" stroke="#f0a690"/>
    <text x="600" y="160">Guest cannot open shared content</text>

    <rect x="120" y="250" width="280" height="100" rx="14" fill="#fff" stroke="#f0c7b9"/>
    <text x="260" y="298">Check site sharing</text><text x="260" y="326">capability</text>

    <rect x="460" y="250" width="280" height="100" rx="14" fill="#fff" stroke="#f0c7b9"/>
    <text x="600" y="298">Check tenant-level</text><text x="600" y="326">sharing rules</text>

    <rect x="800" y="250" width="280" height="100" rx="14" fill="#fff" stroke="#f0c7b9"/>
    <text x="940" y="298">Check Entra</text><text x="940" y="326">domain restrictions</text>

    <rect x="290" y="430" width="280" height="120" rx="14" fill="#fff" stroke="#f0c7b9"/>
    <text x="430" y="482">Verify recipient uses</text><text x="430" y="510">same invited address</text>

    <rect x="650" y="430" width="280" height="120" rx="14" fill="#fff" stroke="#f0c7b9"/>
    <text x="790" y="482">Reshare with</text><text x="790" y="510">Specific people link</text>
  </g>

  <g stroke="#b6634f" stroke-width="4" fill="none">
    <path d="M600 198 L260 250"/>
    <path d="M600 198 L600 250"/>
    <path d="M600 198 L940 250"/>
    <path d="M600 350 L430 430"/>
    <path d="M600 350 L790 430"/>
  </g>
</svg>
