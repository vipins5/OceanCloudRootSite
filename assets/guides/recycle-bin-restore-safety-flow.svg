<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">SharePoint Recycle Bin Safe Restore Flow</title>
  <desc id="desc">Flow diagram showing safe restore phases: scope, what-if, validate, restore, and verify.</desc>
  <rect width="1200" height="620" fill="#f6fbff"/>
  <text x="600" y="64" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" fill="#0f2a44">Safe Recycle Bin Restore Workflow</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#0f2a44" text-anchor="middle">
    <rect x="60" y="160" width="200" height="120" rx="16" fill="#d7ecff" stroke="#7db8f0"/>
    <text x="160" y="208">Define</text>
    <text x="160" y="238">Scope</text>

    <rect x="290" y="160" width="200" height="120" rx="16" fill="#dff7f2" stroke="#74c8b5"/>
    <text x="390" y="208">Run</text>
    <text x="390" y="238">WhatIf</text>

    <rect x="520" y="160" width="200" height="120" rx="16" fill="#fff6df" stroke="#e3be64"/>
    <text x="620" y="208">Review</text>
    <text x="620" y="238">CSV Log</text>

    <rect x="750" y="160" width="200" height="120" rx="16" fill="#ffe7dd" stroke="#ef9d7e"/>
    <text x="850" y="208">Apply</text>
    <text x="850" y="238">Restore</text>

    <rect x="980" y="160" width="160" height="120" rx="16" fill="#eadfff" stroke="#b89ee8"/>
    <text x="1060" y="208">Verify</text>
    <text x="1060" y="238">Access</text>
  </g>

  <g stroke="#4a6d8f" stroke-width="4" fill="none">
    <path d="M260 220 L290 220"/>
    <path d="M490 220 L520 220"/>
    <path d="M720 220 L750 220"/>
    <path d="M950 220 L980 220"/>
  </g>

  <g fill="#4a6d8f">
    <polygon points="290,220 278,212 278,228"/>
    <polygon points="520,220 508,212 508,228"/>
    <polygon points="750,220 738,212 738,228"/>
    <polygon points="980,220 968,212 968,228"/>
  </g>

  <rect x="90" y="350" width="1020" height="190" rx="16" fill="#ffffff" stroke="#cddfee"/>
  <text x="130" y="392" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#0f2a44">Checklist:</text>
  <text x="130" y="428" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#23425f">1) Filter by folder path and deleted date</text>
  <text x="130" y="460" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#23425f">2) Keep WhatIf mode on until matches are confirmed</text>
  <text x="130" y="492" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#23425f">3) Restore parent folders before files when possible</text>
  <text x="130" y="524" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#23425f">4) Validate file open, permissions, and sharing links after restore</text>
</svg>
