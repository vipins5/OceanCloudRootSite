<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">External Sharing Policy Matrix</title>
  <desc id="desc">Matrix showing recommended sharing settings by site classification.</desc>
  <rect width="1200" height="700" fill="#fffdf7"/>
  <text x="600" y="64" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" fill="#4a3a14">External Sharing Policy Matrix</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#3c2f12">
    <rect x="80" y="110" width="1040" height="520" rx="14" fill="#ffffff" stroke="#e7d8a8"/>

    <rect x="80" y="110" width="280" height="90" fill="#f8f0d6"/>
    <rect x="360" y="110" width="220" height="90" fill="#f8f0d6"/>
    <rect x="580" y="110" width="220" height="90" fill="#f8f0d6"/>
    <rect x="800" y="110" width="160" height="90" fill="#f8f0d6"/>
    <rect x="960" y="110" width="160" height="90" fill="#f8f0d6"/>

    <text x="100" y="164">Site type</text>
    <text x="390" y="164">Sharing level</text>
    <text x="610" y="164">Default link</text>
    <text x="820" y="164">Expiry</text>
    <text x="980" y="164">Review</text>

    <rect x="80" y="200" width="1040" height="86" fill="#fff"/>
    <text x="100" y="254">Internal (HR/Finance/Legal)</text>
    <text x="390" y="254">Disabled</text>
    <text x="610" y="254">People in org</text>
    <text x="820" y="254">N/A</text>
    <text x="980" y="254">Quarterly</text>

    <rect x="80" y="286" width="1040" height="86" fill="#fff9ea"/>
    <text x="100" y="340">Controlled external project site</text>
    <text x="390" y="340">New and existing guests</text>
    <text x="610" y="340">Specific people</text>
    <text x="820" y="340">30 days</text>
    <text x="980" y="340">Monthly</text>

    <rect x="80" y="372" width="1040" height="86" fill="#fff"/>
    <text x="100" y="426">Partner workspace</text>
    <text x="390" y="426">Approved domains only</text>
    <text x="610" y="426">Specific people</text>
    <text x="820" y="426">14-30 days</text>
    <text x="980" y="426">Monthly</text>

    <rect x="80" y="458" width="1040" height="86" fill="#fff9ea"/>
    <text x="100" y="512">Public asset library</text>
    <text x="390" y="512">Anyone links by exception</text>
    <text x="610" y="512">Anyone (view)</text>
    <text x="820" y="512">7-14 days</text>
    <text x="980" y="512">Monthly</text>

    <text x="80" y="594" font-size="18" fill="#6c5a2f">Use least privilege first; grant broader access only with documented business justification.</text>
  </g>
</svg>
