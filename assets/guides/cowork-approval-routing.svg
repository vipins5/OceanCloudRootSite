<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">Copilot Cowork approval routing diagram</title>
  <desc id="desc">A multi-team workflow showing intake, finance review, HR planning, IT review, aggregated approval, and kickoff scheduling.</desc>
  <rect width="920" height="360" rx="18" fill="#f8fafc"/>
