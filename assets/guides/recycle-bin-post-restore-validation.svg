<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Post-Restore Validation Checklist for SharePoint</title>
  <desc id="desc">Validation checklist after recycle bin restore covering structure, file integrity, permissions, links, and audit records.</desc>
  <rect width="1200" height="620" fill="#f7fbff"/>
  <text x="600" y="64" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" fill="#16344d">Post-Restore Validation Checklist</text>

  <rect x="90" y="110" width="1020" height="460" rx="18" fill="#ffffff" stroke="#cfe2f1"/>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#1b3f5d">
    <rect x="130" y="156" width="30" height="30" rx="5" fill="#1f9d68"/>
    <path d="M137 171 L146 180 L162 163" stroke="#ffffff" stroke-width="4" fill="none"/>
    <text x="182" y="178">Confirm folder structure and item count match expected scope</text>

    <rect x="130" y="226" width="30" height="30" rx="5" fill="#1f9d68"/>
    <path d="M137 241 L146 250 L162 233" stroke="#ffffff" stroke-width="4" fill="none"/>
    <text x="182" y="248">Open representative files to verify content integrity</text>

    <rect x="130" y="296" width="30" height="30" rx="5" fill="#1f9d68"/>
    <path d="M137 311 L146 320 L162 303" stroke="#ffffff" stroke-width="4" fill="none"/>
    <text x="182" y="318">Review inherited and unique permissions on restored paths</text>

    <rect x="130" y="366" width="30" height="30" rx="5" fill="#1f9d68"/>
    <path d="M137 381 L146 390 L162 373" stroke="#ffffff" stroke-width="4" fill="none"/>
    <text x="182" y="388">Test external/internal sharing links for expected behavior</text>

    <rect x="130" y="436" width="30" height="30" rx="5" fill="#1f9d68"/>
    <path d="M137 451 L146 460 L162 443" stroke="#ffffff" stroke-width="4" fill="none"/>
    <text x="182" y="458">Archive CSV log and record request owner, date, and outcome</text>

    <text x="130" y="530" font-size="19" fill="#4d6a83">Tip: validate with both admin and business-owner accounts before closing the incident.</text>
  </g>
</svg>
