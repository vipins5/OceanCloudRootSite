<svg width="900" height="1120" viewBox="0 0 900 1120" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="apdesc">
  <title id="apdesc">Microsoft Entra B2B external user authentication paths after SharePoint OTP retirement</title>
  <defs>
    <linearGradient id="apbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06121f"/>
      <stop offset="100%" stop-color="#0e2236"/>
    </linearGradient>
    <marker id="apar" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#7bc6e8"/>
    </marker>
  </defs>
  <rect width="900" height="1120" fill="url(#apbg)" rx="20"/>
  <circle cx="820" cy="140" r="180" fill="#00b4d8" opacity="0.08"/>
  <circle cx="80" cy="1060" r="200" fill="#60a5fa" opacity="0.06"/>
  <text x="450" y="74" text-anchor="middle" fill="#e8f6ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="42" font-weight="800">Entra B2B Invitation Redemption</text>
  <text x="450" y="108" text-anchor="middle" fill="#a8cfdf" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21">Auth paths after SharePoint OTP retirement</text>
  <rect x="100" y="138" width="700" height="90" rx="14" fill="#0f2f48" stroke="#3a88ad" stroke-width="2"/>
  <text x="450" y="184" text-anchor="middle" fill="#d9f2ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="26" font-weight="700">External user opens invitation link</text>
  <text x="450" y="213" text-anchor="middle" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">Entra B2B evaluates available identity options</text>
  <line x1="450" y1="228" x2="450" y2="268" stroke="#7bc6e8" stroke-width="3" marker-end="url(#apar)"/>
  <rect x="80" y="270" width="740" height="86" rx="14" fill="#12344f" stroke="#4f90b8" stroke-width="2"/>
  <text x="450" y="314" text-anchor="middle" fill="#e8f6ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">Does the user match a supported identity path?</text>
  <text x="450" y="343" text-anchor="middle" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">Entra B2B checks for a matching identity provider</text>
  <line x1="450" y1="356" x2="450" y2="396" stroke="#7bc6e8" stroke-width="3" marker-end="url(#apar)"/>
  <rect x="40" y="398" width="820" height="148" rx="12" fill="#0f2a40" stroke="#4b91b7" stroke-width="1.5"/>
  <rect x="40" y="398" width="7" height="148" rx="4" fill="#00b4d8"/>
  <circle cx="94" cy="472" r="24" fill="rgba(0,180,216,0.18)"/>
  <text x="94" y="480" text-anchor="middle" fill="#00b4d8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">1</text>
  <text x="132" y="440" fill="#dff3ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">Home Entra Account</text>
  <text x="132" y="468" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20">Work or school identity from another Entra-joined organisation.</text>
  <text x="132" y="494" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20">Entra B2B resolves the user back to their home tenant directly.</text>
  <text x="132" y="526" fill="#8ce1ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Most seamless enterprise route — no extra tenant configuration needed.</text>
  <rect x="40" y="562" width="820" height="148" rx="12" fill="#0f2a40" stroke="#4b91b7" stroke-width="1.5"/>
  <rect x="40" y="562" width="7" height="148" rx="4" fill="#60a5fa"/>
  <circle cx="94" cy="636" r="24" fill="rgba(96,165,250,0.18)"/>
  <text x="94" y="644" text-anchor="middle" fill="#60a5fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">2</text>
  <text x="132" y="604" fill="#dff3ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">Microsoft Account (MSA)</text>
  <text x="132" y="632" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20">Outlook.com, Hotmail.com, or Live.com consumer identities.</text>
  <text x="132" y="658" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20">User signs in with a personal Microsoft account during redemption.</text>
  <text x="132" y="690" fill="#8ce1ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Typical for personal accounts used in business collaboration.</text>
  <rect x="40" y="726" width="820" height="148" rx="12" fill="#0f2a40" stroke="#4b91b7" stroke-width="1.5"/>
  <rect x="40" y="726" width="7" height="148" rx="4" fill="#4ade80"/>
  <circle cx="94" cy="800" r="24" fill="rgba(74,222,128,0.18)"/>
  <text x="94" y="808" text-anchor="middle" fill="#4ade80" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">3</text>
  <text x="132" y="768" fill="#dff3ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">Google Sign-In</text>
  <text x="132" y="796" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20">Available when Google is configured as IdP in Entra External ID.</text>
  <text x="132" y="822" fill="#9ec6de" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20">User is redirected to Google to authenticate, then returned to Entra.</text>
  <text x="132" y="854" fill="#8ce1ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Best path for @gmail.com and @googlemail.com users.</text>
  <rect x="40" y="890" width="820" height="148" rx="12" fill="#17293a" stroke="#86b1bf" stroke-width="1.5" stroke-dasharray="7,3"/>
  <rect x="40" y="890" width="7" height="148" rx="4" fill="#94a3b8"/>
  <circle cx="94" cy="964" r="24" fill="rgba(148,163,184,0.18)"/>
  <text x="94" y="972" text-anchor="middle" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">4</text>
  <text x="132" y="932" fill="#c8daea" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">Email One-Time Passcode — Fallback</text>
  <text x="132" y="960" fill="#8ca4b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20">Entra B2B email OTP when no supported identity provider matches.</text>
  <text x="132" y="986" fill="#8ca4b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20">User receives a one-time code by email and enters it to proceed.</text>
  <text x="132" y="1018" fill="#7a94a8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Distinct from the retired legacy SharePoint OTP — still part of Entra B2B flow.</text>
</svg>