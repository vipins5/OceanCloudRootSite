name: Release Readiness Automation

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: oceancloud-ai-proxy/package-lock.json

      - name: Install worker dependencies
        working-directory: oceancloud-ai-proxy
        run: npm ci --include=dev

      - name: Check links and script bundle
        id: links
        continue-on-error: true
        run: python scripts/check-links.py --strict

      - name: Check content QA report rules
        id: qa
        continue-on-error: true
        run: python scripts/content-qa-report.py

      - name: Run worker tests
        id: tests
        continue-on-error: true
        working-directory: oceancloud-ai-proxy
        run: npm run -s test -- --run

      - name: Run worker typecheck
        id: typecheck
        continue-on-error: true
        working-directory: oceancloud-ai-proxy
        run: npm run -s typecheck

      - name: Build release readiness report
        id: checks
        shell: bash
        env:
          LINKS_CONCLUSION: ${{ steps.links.conclusion }}
          QA_CONCLUSION: ${{ steps.qa.conclusion }}
          TEST_CONCLUSION: ${{ steps.tests.conclusion }}
          TSC_CONCLUSION: ${{ steps.typecheck.conclusion }}
        run: |
          set -euo pipefail

          to_exit_code() {
            if [ "$1" = "success" ]; then
              echo "0"
            else
              echo "1"
            fi
          }

          LINKS_EXIT="$(to_exit_code "$LINKS_CONCLUSION")"
          QA_EXIT="$(to_exit_code "$QA_CONCLUSION")"
          TEST_EXIT="$(to_exit_code "$TEST_CONCLUSION")"
          TSC_EXIT="$(to_exit_code "$TSC_CONCLUSION")"

          mkdir -p data/reports
          REPORT="data/reports/release-readiness-report.md"

          if [ "$LINKS_EXIT" -eq 0 ] && [ "$QA_EXIT" -eq 0 ] && [ "$TEST_EXIT" -eq 0 ] && [ "$TSC_EXIT" -eq 0 ]; then
            READY="true"
          else
            READY="false"
          fi

          {
            echo "# Release Readiness Report"
            echo ""
            echo "Generated: $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo "Ready for release: $READY"
            echo ""
            echo "## Check Results"
            echo ""
            echo "- Link and script checks: $LINKS_EXIT ($LINKS_CONCLUSION)"
            echo "- Content QA report checks: $QA_EXIT ($QA_CONCLUSION)"
            echo "- Worker tests: $TEST_EXIT ($TEST_CONCLUSION)"
            echo "- Worker TypeScript check: $TSC_EXIT ($TSC_CONCLUSION)"
            echo ""
            echo "## Recent Commits"
            echo ""
            git log --oneline -n 12
          } > "$REPORT"

          cat "$REPORT"

          echo "ready_for_release=$READY" >> "$GITHUB_OUTPUT"
          echo "report_path=$REPORT" >> "$GITHUB_OUTPUT"

      - name: Upload release readiness report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness-report
          path: data/reports/release-readiness-report.md
          if-no-files-found: warn

      - name: Publish job summary
        if: always()
        run: |
          echo "## Release Readiness Automation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f data/reports/release-readiness-report.md ]; then
            cat data/reports/release-readiness-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No release report generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail if not ready for release
        if: steps.checks.outputs.ready_for_release != 'true'
        run: |
          echo "Release readiness checks failed. See report artifact for details."
          exit 1
