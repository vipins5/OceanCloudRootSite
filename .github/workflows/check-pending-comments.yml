name: Check Pending Comments

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  pending-comments:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check pending comments
        id: check
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: python scripts/check-pending-comments.py

      - name: Create or update pull request
        if: steps.check.outputs.has_pending == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="pending-comments-moderation"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Reuse the same branch so we never flood with PRs.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          git add data/comment-moderation/pending-comments.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "chore: update pending comment moderation report (${{ steps.check.outputs.pending_count }} pending)"
          git push origin "$BRANCH"

          # Only open a new PR if one does not exist yet.
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open - report updated on branch."
          else
            # Use --body-file so markdown with quotes, backticks, or $ signs is safe.
            gh pr create \
              --title "Pending comments need moderation (${{ steps.check.outputs.pending_count }} pending)" \
              --body-file "${{ steps.check.outputs.report_path }}" \
              --base main \
              --head "$BRANCH"
          fi

      - name: Write job summary
        if: always()
        run: |
          echo "## Pending Comments Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Run date: $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check.outputs.has_pending }}" = "true" ]; then
            echo "PR opened/updated - ${{ steps.check.outputs.pending_count }} comment(s) pending." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No pending report generated; PR creation skipped." >> "$GITHUB_STEP_SUMMARY"
          fi