name: Generate Guide Draft

# Runs daily at 09:00 UTC — only if topics are queued in data/guide-topics.json.
# Add a topic to that file and push; the next run creates a manual scaffold PR.
# No paid AI API calls are made. Complete the scaffold before merging to publish.
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-guide:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate manual guide scaffold
        id: gen
        run: python scripts/generate-guide.py

      - name: Create branch, commit, and open PR
        id: publish
        if: steps.gen.outputs.slug != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          SLUG="${{ steps.gen.outputs.slug }}"
          TITLE="${{ steps.gen.outputs.title }}"
          PR_BODY="${{ steps.gen.outputs.pr_body }}"
          BRANCH="draft/${SLUG}"
          MANUAL_URL="https://github.com/${REPO}/compare/main...${BRANCH}?expand=1"

          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "manual_url=${MANUAL_URL}" >> "$GITHUB_OUTPUT"

          git config user.name  "OceanCloud Guide Bot"
          git config user.email "bot@oceancloudconsults.com"

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git stash push --include-untracked -m "generated scaffold before existing branch checkout" || true
            git fetch origin "$BRANCH:$BRANCH"
            git checkout "$BRANCH"
            git stash pop || true
          else
            git checkout -b "$BRANCH"
          fi

          git add "articles/${SLUG}.html" \
                  guides.html \
                  js/article.js \
                  data/search-index.json \
                  sitemap.xml
          if git diff --cached --quiet; then
            echo "No scaffold changes to commit; using existing draft branch."
          else
            git commit -m "draft: ${TITLE}"
            git push -u origin "$BRANCH"
          fi

          if PR_URL=$(gh pr create \
            --title "Draft: ${TITLE}" \
            --body-file "${PR_BODY}" \
            --base main \
            --head "$BRANCH" 2>&1); then
            echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
            echo "✓ PR opened: ${PR_URL}"
          else
            echo "::warning::Could not open PR automatically. Open it manually: ${MANUAL_URL}. Details: ${PR_URL}"
          fi

      - name: No topics queued
        if: steps.gen.outputs.slug == ''
        run: echo "No pending topics in guide-topics.json — nothing to do today."

      - name: Job summary
        if: always()
        env:
          GEN_SLUG: ${{ steps.gen.outputs.slug }}
          GEN_TITLE: ${{ steps.gen.outputs.title }}
          DRAFT_BRANCH: ${{ steps.publish.outputs.branch }}
          PR_URL: ${{ steps.publish.outputs.pr_url }}
          MANUAL_URL: ${{ steps.publish.outputs.manual_url }}
        run: |
          echo "## Guide Generation Run" >> $GITHUB_STEP_SUMMARY
          echo "Date: $(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          if [ -n "$GEN_SLUG" ]; then
            echo "**Manual scaffold prepared for:** $GEN_TITLE" >> $GITHUB_STEP_SUMMARY
            if [ -n "$PR_URL" ]; then
              echo "PR: $PR_URL" >> $GITHUB_STEP_SUMMARY
            elif [ -n "$MANUAL_URL" ]; then
              echo "Draft branch: $DRAFT_BRANCH" >> $GITHUB_STEP_SUMMARY
              echo "Open PR manually: $MANUAL_URL" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "No new draft generated (queue empty or all topics already published)." >> $GITHUB_STEP_SUMMARY
          fi
