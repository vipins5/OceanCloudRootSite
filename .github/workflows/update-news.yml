name: Update Microsoft 365 News

# Runs every Monday at 08:00 UTC, or trigger manually from GitHub Actions tab
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch, rewrite, and update news + archive
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/fetch-news.py

      - name: Show diff summary
        run: |
          echo "=== git status ==="
          git status
          echo "=== changed lines ==="
          git diff --stat || echo "(no diff)"

      - name: Commit and push if anything changed
        run: |
          git config user.name  "OceanCloud News Bot"
          git config user.email "bot@oceancloudconsults.com"
          git add news.html archive.html data/archive.json
          if git diff --cached --quiet; then
            echo "No changes to commit — all content is already up to date."
          else
            git commit -m "chore: auto-update M365 news + archive $(date -u +%Y-%m-%d)"
            git push
          fi
