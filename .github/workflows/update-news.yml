name: Update Microsoft 365 News

# Runs Mon / Wed / Fri at 08:00 UTC, or trigger manually.
# AI rewrite engine: Gemini (primary). Set GEMINI_API_KEY secret to activate.
# Claude fallback:   set ANTHROPIC_API_KEY secret — used automatically when
#                    Gemini key is absent or returns an error.
on:
  schedule:
    - cron: '0 8 * * 1'   # Monday
    - cron: '0 8 * * 3'   # Wednesday
    - cron: '0 8 * * 5'   # Friday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch, rewrite, and update news + archive
        # Add secrets in: repo Settings → Secrets and variables → Actions → New repository secret
        # Priority order: Claude → ChatGPT → Gemini → original text (first available key wins)
        # ANTHROPIC_API_KEY → Claude claude-haiku-4-5-20251001          (primary)
        # OPENAI_API_KEY    → ChatGPT gpt-4o-mini           (secondary)
        # GEMINI_API_KEY    → Google Gemini 2.0 Flash        (tertiary)
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY    || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY    || '' }}
        run: python scripts/fetch-news.py

      - name: Show diff summary
        run: |
          echo "=== git status ==="
          git status
          echo "=== changed lines ==="
          git diff --stat || echo "(no diff)"

      - name: Commit and push if anything changed
        run: |
          git config user.name  "OceanCloud News Bot"
          git config user.email "bot@oceancloudconsults.com"
          git add news.html archive.html data/archive.json data/search-index.json sitemap.xml
          git add articles/news-*.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit — all content is already up to date."
          else
            git commit -m "chore: auto-update M365 news + article pages $(date -u +%Y-%m-%d)"
            git push
            echo "✓ News committed and pushed."
          fi

      - name: Job summary
        if: always()
        run: |
          echo "## News Update Complete" >> $GITHUB_STEP_SUMMARY
          echo "Run date: $(date -u +%Y-%m-%d\ %H:%M\ UTC)" >> $GITHUB_STEP_SUMMARY
