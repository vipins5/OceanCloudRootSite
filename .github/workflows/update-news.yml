name: Update Microsoft 365 News

# Temporarily manual-only while Google reassesses the site's curated content.
# AI rewrite engine: ChatGPT/OpenAI first, Gemini fallback.
# Throttled from 3x/week -> 1x/week on 2026-07-20: the site is a 2-month-old
# domain and Search Console showed 45/47 tracked pages either uncrawled or
# "Crawled - currently not indexed", with crawl activity frozen since
# mid-June. Publishing new templated news pages 3x/week was adding to a
# thin-content footprint while Google wasn't indexing existing content, so
# this cuts new-page velocity ~3x while trust builds.
on:
  workflow_dispatch:

concurrency:
  group: update-news-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch, rewrite, and update news + archive
        # Add secrets in: repo Settings → Secrets and variables → Actions → New repository secret
        # Priority order: ChatGPT/OpenAI → Gemini → original text
        # OPENAI_API_KEY    → ChatGPT gpt-4o-mini
        # GEMINI_API_KEY    → Google Gemini 2.0 Flash
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY    || '' }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY    || '' }}
        run: python scripts/fetch-news.py

      - name: Show diff summary
        run: |
          echo "=== git status ==="
          git status
          echo "=== changed lines ==="
          git diff --stat || echo "(no diff)"

      - name: Commit and push if anything changed
        run: |
          git config user.name  "OceanCloud News Bot"
          git config user.email "bot@oceancloudconsults.com"
          git add news.html archive.html data/archive.json data/search-index.json sitemap.xml
          git add articles/news-*.html articles/guide-*.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit — all content is already up to date."
          else
            git commit -m "chore: auto-update M365 news + article pages $(date -u +%Y-%m-%d)"
            git push
            echo "✓ News committed and pushed."
          fi

      - name: Job summary
        if: always()
        run: |
          echo "## News Update Complete" >> $GITHUB_STEP_SUMMARY
          echo "Run date: $(date -u +%Y-%m-%d\ %H:%M\ UTC)" >> $GITHUB_STEP_SUMMARY
