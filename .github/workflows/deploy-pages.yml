name: Deploy to GitHub Pages

# Deploys on every push to main AND can be triggered manually.
# Requires: Settings → Pages → Source = "GitHub Actions" (not "Deploy from branch")
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deploy; don't cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build job: prepares and uploads the site artifact exactly once.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so lastmod script works

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'               # deploy the whole repo root

  # Deploy job: publishes the artifact produced by the build job.
  # Kept separate so "Re-run failed jobs" re-runs only this step and
  # reuses the single artifact instead of creating a duplicate
  # (avoids "Multiple artifacts named github-pages" failures on re-runs).
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout (for IndexNow submission)
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Submit URLs to IndexNow
        shell: pwsh
        run: |
          # Submit all indexed URLs from sitemaps to IndexNow (Bing/Google discovery)
          $script = Join-Path $env:GITHUB_WORKSPACE "scripts/submit-indexnow.ps1"
          & $script -UseSitemap
        continue-on-error: true
