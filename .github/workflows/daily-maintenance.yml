name: Monthly Site Maintenance

# Runs on the first day of each month at 07:00 UTC.
# Message Center pages remain noindex and outside the canonical sitemap index.
# Also triggerable manually from the Actions tab.
on:
  schedule:
    - cron: '0 7 1 * *'
  workflow_dispatch:

concurrency:
  group: daily-maintenance-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout with full history so git log dates are available ────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python for sitemap + link-checker scripts ────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3a. Regenerate noindex Message Center pages ─────────────────────────
      - name: Build Message Center pages
        id: build_mc
        continue-on-error: true
        run: |
          echo "=== Message Center pages ==="
          python scripts/build-mc-seo-pages.py

      # ── 3b. Update sitemap.xml lastmod dates from git history ───────────────
      - name: Update sitemap lastmod dates
        id: update_sitemap
        run: |
          echo "=== Sitemap update ==="
          python scripts/update-sitemap.py

      # ── 4. Internal link checker ────────────────────────────────────────────
      - name: Check internal links
        id: check_links
        run: |
          echo "=== Internal link check ==="
          python scripts/check-links.py --strict
          # Strict: fails if internal links are broken or article pages miss shared scripts

      # ── 5. Quick HTML well-formedness check with Python's html.parser ───────
      - name: Validate HTML structure
        id: validate_html
        run: |
          echo "=== HTML validation ==="
          python - <<'PYEOF'
          import sys
          from html.parser import HTMLParser
          from pathlib import Path

          class Validator(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.errors = []
              def handle_error(self, message):
                  self.errors.append(message)

          root = Path(".")
          files = sorted(root.glob("**/*.html"))
          bad = 0
          for f in files:
              try:
                  v = Validator()
                  v.feed(f.read_text(encoding="utf-8", errors="ignore"))
                  if v.errors:
                      print(f"  ⚠  {f}: {len(v.errors)} issue(s)")
                      bad += 1
              except Exception as e:
                  print(f"  ✗  {f}: parse error — {e}")
                  bad += 1
          total = len(files)
          ok    = total - bad
          print(f"\n{ok}/{total} files clean,  {bad} with issues.")
          if bad:
              sys.exit(1)
          PYEOF

      # ── 6. Commit monthly content and sitemap changes ───────────────────────
      - name: Commit monthly changes
        run: |
          git config user.name  "OceanCloud Maintenance Bot"
          git config user.email "bot@oceancloudconsults.com"
          git add sitemap.xml sitemap-mc.xml mc/
          if git diff --cached --quiet; then
            echo "Monthly generated content is already up to date — nothing to commit."
          else
            git commit -m "chore: monthly Message Center and sitemap update $(date -u +%Y-%m-%d)"
            git push
            echo "✓ Monthly changes committed and pushed."
          fi

      # ── 7. Print a job summary ───────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "## Monthly Maintenance Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Message Center page generation | ${{ steps.build_mc.outcome }} (monthly, noindex) |" >> $GITHUB_STEP_SUMMARY
          echo "| Sitemap lastmod update | ${{ steps.update_sitemap.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Internal link check | ${{ steps.check_links.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| HTML validation | ${{ steps.validate_html.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run date: $(date -u +%Y-%m-%d\ %H:%M\ UTC)" >> $GITHUB_STEP_SUMMARY

      - name: Fail when Message Center generation failed
        if: always() && steps.build_mc.outcome == 'failure'
        run: |
          echo "Message Center generation failed; review the build log before publishing generated content."
          exit 1
