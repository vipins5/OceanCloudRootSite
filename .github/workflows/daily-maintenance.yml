name: Weekly Site Maintenance

# Runs weekly on Monday at 07:00 UTC (before the weekly news run at 08:00 Mon).
# Throttled from daily -> weekly on 2026-07-20: the site is a 2-month-old
# domain and Search Console showed 45/47 tracked pages either uncrawled or
# "Crawled - currently not indexed", with crawl activity frozen since mid-June.
# Publishing a new batch of Message Center pages every day was adding to a
# thin/templated-content footprint while Google wasn't even indexing the
# existing content, so this cuts new-page velocity ~7x while trust builds.
# Also triggerable manually from the Actions tab.
on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

concurrency:
  group: daily-maintenance-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout with full history so git log dates are available ────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python for sitemap + link-checker scripts ────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3a. Regenerate Message Center SEO pages + sitemap-mc.xml ────────────
      - name: Build Message Center SEO pages
        run: |
          echo "=== Message Center SEO pages ==="
          # Pulls the latest MC feed (plus seeded/historical IDs) from the
          # public worker proxy and regenerates mc/*.html + sitemap-mc.xml.
          # No secrets required — uses the public Message Center endpoint.
          python scripts/build-mc-seo-pages.py || echo "⚠ MC SEO build skipped (endpoint unavailable)"

      # ── 3b. Update sitemap.xml lastmod dates from git history ───────────────
      - name: Update sitemap lastmod dates
        run: |
          echo "=== Sitemap update ==="
          python scripts/update-sitemap.py

      # ── 4. Internal link checker ────────────────────────────────────────────
      - name: Check internal links
        run: |
          echo "=== Internal link check ==="
          python scripts/check-links.py --strict
          # Strict: fails if internal links are broken or article pages miss shared scripts

      # ── 5. Quick HTML well-formedness check with Python's html.parser ───────
      - name: Validate HTML structure
        run: |
          echo "=== HTML validation ==="
          python - <<'PYEOF'
          import sys
          from html.parser import HTMLParser
          from pathlib import Path

          class Validator(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.errors = []
              def handle_error(self, message):
                  self.errors.append(message)

          root = Path(".")
          files = sorted(root.glob("**/*.html"))
          bad = 0
          for f in files:
              try:
                  v = Validator()
                  v.feed(f.read_text(encoding="utf-8", errors="ignore"))
                  if v.errors:
                      print(f"  ⚠  {f}: {len(v.errors)} issue(s)")
                      bad += 1
              except Exception as e:
                  print(f"  ✗  {f}: parse error — {e}")
                  bad += 1
          total = len(files)
          ok    = total - bad
          print(f"\n{ok}/{total} files clean,  {bad} with issues.")
          PYEOF

      # ── 6. Commit sitemap + MC pages if they changed ────────────────────────
      - name: Commit sitemap changes
        run: |
          git config user.name  "OceanCloud Maintenance Bot"
          git config user.email "bot@oceancloudconsults.com"
          git add sitemap.xml sitemap-mc.xml mc/
          if git diff --cached --quiet; then
            echo "Sitemap and MC pages already up to date — nothing to commit."
          else
            git commit -m "chore: update sitemap + MC pages $(date -u +%Y-%m-%d)"
            git push
            echo "✓ Sitemap and MC pages committed and pushed."
          fi

      # ── 7. Print a job summary ───────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "## Daily Maintenance Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Message Center SEO pages | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Sitemap lastmod update | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Internal link check | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| HTML validation | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run date: $(date -u +%Y-%m-%d\ %H:%M\ UTC)" >> $GITHUB_STEP_SUMMARY
