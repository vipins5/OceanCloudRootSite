name: Daily Site Maintenance

# Runs every day at 07:00 UTC (before the weekly news run at 08:00 Mon)
# Also triggerable manually from the Actions tab.
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout with full history so git log dates are available ────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python for sitemap + link-checker scripts ────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Update sitemap.xml lastmod dates from git history ────────────────
      - name: Update sitemap lastmod dates
        run: |
          echo "=== Sitemap update ==="
          python scripts/update-sitemap.py

      # ── 4. Internal link checker ────────────────────────────────────────────
      - name: Check internal links
        run: |
          echo "=== Internal link check ==="
          python scripts/check-links.py
          # Non-strict: reports but does not fail the build

      # ── 5. Quick HTML well-formedness check with Python's html.parser ───────
      - name: Validate HTML structure
        run: |
          echo "=== HTML validation ==="
          python - <<'PYEOF'
          import sys
          from html.parser import HTMLParser
          from pathlib import Path

          class Validator(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.errors = []
              def handle_error(self, message):
                  self.errors.append(message)

          root = Path(".")
          files = sorted(root.glob("**/*.html"))
          bad = 0
          for f in files:
              try:
                  v = Validator()
                  v.feed(f.read_text(encoding="utf-8", errors="ignore"))
                  if v.errors:
                      print(f"  ⚠  {f}: {len(v.errors)} issue(s)")
                      bad += 1
              except Exception as e:
                  print(f"  ✗  {f}: parse error — {e}")
                  bad += 1
          total = len(files)
          ok    = total - bad
          print(f"\n{ok}/{total} files clean,  {bad} with issues.")
          PYEOF

      # ── 6. Commit sitemap if it changed ─────────────────────────────────────
      - name: Commit sitemap changes
        run: |
          git config user.name  "OceanCloud Maintenance Bot"
          git config user.email "bot@oceancloudconsults.com"
          git add sitemap.xml
          if git diff --cached --quiet; then
            echo "Sitemap already up to date — nothing to commit."
          else
            git commit -m "chore: update sitemap lastmod $(date -u +%Y-%m-%d)"
            git push
            echo "✓ Sitemap committed and pushed."
          fi

      # ── 7. Print a job summary ───────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "## Daily Maintenance Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Sitemap lastmod update | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Internal link check | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| HTML validation | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run date: $(date -u +%Y-%m-%d\ %H:%M\ UTC)" >> $GITHUB_STEP_SUMMARY
